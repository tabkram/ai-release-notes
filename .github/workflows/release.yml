name: Release to NPM
on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: Choose the version bump type
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]
permissions:
  contents: write

concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build

      - name: Bump Version & Generate Changelog
        env:
          VERSION_BUMP: ${{ inputs.version_bump }}
        run: |
          npm version "$VERSION_BUMP" --no-git-tag-version
          npx conventional-changelog -p conventionalcommits -i CHANGELOG.md -s

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="$(node -p "require('./package.json').version")"
          git add .
          git commit -m "chore(release): $VERSION"
          git push --follow-tags

      - name: Show next step
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          {
            echo "## v$VERSION is ready"
            echo
            echo "Create and publish a GitHub Release named **v$VERSION** from the main branch."
            echo "The **Publish to npm** workflow will validate and publish it automatically."
          } >> "$GITHUB_STEP_SUMMARY"
