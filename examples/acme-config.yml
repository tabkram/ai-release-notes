# Example: ACME Corp project configuration
# Copy this to your project root as .ai-release-notes.yml
#
# IMPORTANT: API keys are NOT stored in this file.
# Only the API key for the provider you use is required.
# Set it as an environment variable before running:
#
#   export ANTHROPIC_API_KEY=sk-ant-... # for Anthropic (default here)
#   export OPENAI_API_KEY=sk-...        # for OpenAI
#
# You only need ONE — the one matching your chosen provider.

projectName: ACME Platform

provider: anthropic

providers:
  anthropic:
    model: claude-sonnet-4-20250514
    temperature: 0.3
    maxTokens: 4000

  openai:
    model: gpt-4o
    temperature: 0.3
    maxTokens: 4000

# ─────────────────────────────────────────
# Project-specific prompt config
# ─────────────────────────────────────────

prompt:
  languages:
    - en

  instructions:
    file: ./.ai-release-instructions.md

# ─────────────────────────────────────────
# Output settings
# ─────────────────────────────────────────

output:
  - format: markdown
    saveTo: ./RELEASE_NOTES.md
