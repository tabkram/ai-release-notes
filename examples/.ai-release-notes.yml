# Example: ACME Corp project configuration
# Copy this file to your project root.
#
# IMPORTANT: API keys are NOT stored in this file.
# Only the API key for the provider you use is required.
# Set it as an environment variable before running:
#
#   export ANTHROPIC_API_KEY=sk-ant-... # for Anthropic (default here)
#   export OPENAI_API_KEY=sk-...        # for OpenAI
#
# You only need ONE — the one matching your chosen provider.

projectName: ACME Platform

provider: anthropic

providers:
  anthropic:
    model: claude-sonnet-4-20250514
    temperature: 0.3
    maxTokens: 4000

  openai:
    model: gpt-4o
    temperature: 0.3
    maxTokens: 4000

# ─────────────────────────────────────────
# Project-specific prompt config
# ─────────────────────────────────────────

prompt:
  languages:
    - en

  # Optional: create this file and uncomment to add project writing rules.
  # instructions:
  #   file: ./.ai-release-instructions.md

# ─────────────────────────────────────────
# Output settings
# ─────────────────────────────────────────

output:
  - format: markdown
    saveTo: ./releases/RELEASE_NOTES_{env}_{from}_{to}.md

# Output index linking to each generated release file.
outputIndex:
  format: markdown
  saveTo: ./releases/RELEASE_INDEX_{env}.md
  # Optional: create this file and uncomment to customize the index layout.
  # template: ./.ai-output-index-template.md
